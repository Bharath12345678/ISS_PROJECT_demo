<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Lobby</title>
        <link rel="stylesheet" href="/templates/style.css">
        <style>
            body {
                font-family: sans-serif;
                padding: 20px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(3, 100px);
                gap: 5px;
                margin-top: 20px;
            }
            .cell { 
                width: 100px; 
                height: 100px; 
                border: 2px solid #333; 
                font-size: 3em; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                cursor: pointer; 
            }
            .cell:hover { 
                background-color: #f0f0f0; 
            }
            .hidden { 
                display: none; 
            }
            .user-item { 
                cursor: pointer; 
                color: blue; 
                text-decoration: underline; 
                margin: 5px 0; 
            }
        </style>
    </head>
    <body>
        <div id = "lobby-view">
            <h1>Live Lobby</h1>
            <p>Click a user to send a match challenge.</p>
            <ul id="user-list"></ul>
            <br>
            <a href="/leaderboard"><button>View Global Leaderboard</button></a>
        </div>

        <div id="challenge-modal" class="hidden" style="margin-top: 20px; padding: 15px; border: 2px solid blue; background-color: #e6f2ff; max-width: 300px;">
            <p id="challenge-text"></p>
            <button id="accept-btn">Accept</button>
            <button id="decline-btn">Decline</button>
        </div>

        <div id = "game-view" class = "hidden">
            <h2 id="turn-indicator"></h2>
            <div class="grid" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
        </div>

        <script>
            const uid = sessionStorage.getItem("uid");
            if(!uid) {
                window.location.href = "/";
            }

            const ws = new WebSocket(`ws://${window.location.host}/ws/${uid}`);
            let currentRoom = null;
            let isPlaying = false;
            let pendingChallenger = null;
            let myTurn = false;

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if(data.type === "lobby_update") {
                    const list = document.getElementById("user-list");
                    list.innerHTML = "";
                    data.users.forEach(user => {
                        if(user !== uid) {
                            const li = document.createElement("li");
                            li.textContent = user;
                            li.className = "user-item";
                            li.onclick = () => ws.send(JSON.stringify({action: "challenge", target: user}));
                            list.appendChild(li);
                        }
                    });
                }
                else if(data.type === "challenge_received") {
                    if (isPlaying) {
                        ws.send(JSON.stringify({action: "decline_challenge", challenger: data.challenger}));
                        return;
                    }
                    pendingChallenger = data.challenger;
                    document.getElementById("challenge-text").textContent = `Challenge from ${pendingChallenger}`;
                    document.getElementById("challenge-modal").classList.remove("hidden");
                }
                else if(data.type === "error") {
                    document.getElementById("challenge-modal").classList.add("hidden");
                }
                else if(data.type === "challenge_declined") {
                    document.getElementById("turn-indicator").textContent = `${data.target} declined.`;
                }
                else if(data.type === "game_start") {
                    isPlaying = true;
                    currentRoom = data.room_id;
                    document.getElementById("challenge-modal").classList.add("hidden");
                    ws.send(JSON.stringify({action: "set_room", room_id: currentRoom}));
                    document.getElementById("lobby-view").classList.add("hidden");
                    document.getElementById("game-view").classList.remove("hidden");
                } 
                else if(data.type === "game_state") {
                    const cells = document.querySelectorAll(".cell");
                    data.board.forEach((val, idx) => {
                        cells[idx].textContent = val;
                    });
                    myTurn = data.turn === uid;
                    document.getElementById("turn-indicator").textContent = myTurn ? "Your Turn" : "Opponent's Turn";
                } 
                else if(data.type === "game_over") {
                    isPlaying = false;
                    myTurn = false;
                    let finalMsg = "";
                    
                    if(data.winner === "forfeit") {
                        finalMsg = "Opponent disconnected. You win by forfeit!";
                    } 
                    else if(data.winner === "Draw") {
                        finalMsg = "Game ended in a draw.";
                    } 
                    else {
                        finalMsg = data.winner === uid ? "You Won!" : "You Lost!";
                    }
                    
                    document.getElementById("turn-indicator").textContent = finalMsg;
                    
                    setTimeout(() => {
                        location.reload();
                    }, 3000);
                }
            };

            document.getElementById("accept-btn").onclick = () => {
                ws.send(JSON.stringify({action: "accept_challenge", challenger: pendingChallenger}));
                document.getElementById("challenge-modal").classList.add("hidden");
            };

            document.getElementById("decline-btn").onclick = () => {
                ws.send(JSON.stringify({action: "decline_challenge", challenger: pendingChallenger}));
                document.getElementById("challenge-modal").classList.add("hidden");
            };

            function makeMove(pos) {
                if(currentRoom && myTurn) {
                    ws.send(JSON.stringify({action: "move", room_id: currentRoom, position: pos}));
                }
            }
        </script>
    </body>
</html>
